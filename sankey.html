<!DOCTYPE html>
<div id="container">
    <div id="tooltip" style="font-size: 12px; position: absolute; background: #1a1a2e; color: #fff; border-radius: 4px; padding: 8px 12px; pointer-events: none; opacity: 0; line-height: 1.6;"></div>
</div>

<script type="module">
  import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
  import { sankey, sankeyLinkHorizontal } from "https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/+esm";

  const tooltip = d3.select("#tooltip");

  // Colors matching the other charts (Full, Marginal, Low, Very Low + entry nodes)
  const nodeColor = {
    0: "#555",      // All Households
    1: "#e07b3a",   // Reported Worry (Marginal color — at risk)
    2: "#3266ad",   // Full Food Security
    3: "#a64ca6",   // Severe Hardship
    4: "#3fa67a",   // Marginal Food Security
    5: "#c4122d",   // Assessed further
    6: "#3fa67a",   // Low Food Security
    7: "#a64ca6",   // Very Low Food Security
  };

  // 2021-2023 counts: full=6939, marginal=1376, low=1234, very low=1032
  const TOTAL    = 10581;
  const FULL     = 6939;
  const MARGINAL = 1376;
  const LOW      = 1234;
  const VERY_LOW = 1032;
  const AT_RISK  = TOTAL - FULL;
  const SEVERE   = LOW + VERY_LOW;

  const nodes = [
    { id: 0, name: "All Households\n(10,581)" },
    { id: 1, name: "Reported Food\nWorry / Hardship\n(3,642)" },
    { id: 2, name: "Full Food\nSecurity\n(6,939)" },
    { id: 3, name: "Reported Severe\nHardship\n(2,266)" },
    { id: 4, name: "Marginal Food\nSecurity\n(1,376)" },
    { id: 5, name: "Assessed for\nNot Eating\n(2,266)" },
    { id: 6, name: "Low Food\nSecurity\n(1,234)" },
    { id: 7, name: "Very Low Food\nSecurity\n(1,032)" },
  ];

  const links = [
    { source: 0, target: 1, value: AT_RISK,   label: `${AT_RISK.toLocaleString()} households reported food worry or hardship (FSD032A/B/C)` },
    { source: 0, target: 2, value: FULL,       label: `${FULL.toLocaleString()} households reported no food worry → Full Food Security` },
    { source: 1, target: 3, value: SEVERE,     label: `${SEVERE.toLocaleString()} households reported severe hardship (cut meals, went hungry, lost weight)` },
    { source: 1, target: 4, value: MARGINAL,   label: `${MARGINAL.toLocaleString()} households reported only mild hardship → Marginal Food Security` },
    { source: 3, target: 5, value: SEVERE,     label: `${SEVERE.toLocaleString()} households assessed for going a whole day without eating (FSD092)` },
    { source: 5, target: 6, value: LOW,        label: `${LOW.toLocaleString()} households did not go a whole day without eating → Low Food Security` },
    { source: 5, target: 7, value: VERY_LOW,   label: `${VERY_LOW.toLocaleString()} households went a whole day without eating → Very Low Food Security` },
  ];

  // Chart dimensions — generous margins so labels don't get clipped
  const width        = 860;
  const height       = 500;
  const marginTop    = 10;
  const marginRight  = 130;
  const marginBottom = 20;
  const marginLeft   = 110;

  const svg = d3.create("svg")
    .attr("width", width)
    .attr("height", height);

  const g = svg.append("g").attr("transform", `translate(${marginLeft},${marginTop})`);

  const sankeyGen = sankey()
    .nodeId(d => d.id)
    .nodeWidth(18)
    .nodePadding(22)
    .extent([[0, 0], [width - marginLeft - marginRight, height - marginTop - marginBottom]]);

  const { nodes: sankeyNodes, links: sankeyLinks } = sankeyGen({
    nodes: nodes.map(d => ({ ...d })),
    links: links.map(d => ({ ...d })),
  });

  // Links
  g.append("g").attr("fill", "none")
    .selectAll("path")
    .data(sankeyLinks)
    .join("path")
    .attr("d", sankeyLinkHorizontal())
    .attr("stroke", d => nodeColor[d.source.id] || "#aaa")
    .attr("stroke-width", d => Math.max(1, d.width))
    .attr("stroke-opacity", 0.3)
    .on("mouseover", function(event, d) {
      d3.select(this).attr("stroke-opacity", 0.65);
      tooltip.style("opacity", 1).html(d.label);
    })
    .on("mousemove", function(event) {
      tooltip.style("left", (event.pageX + 10) + "px").style("top", (event.pageY + 10) + "px");
    })
    .on("mouseout", function() {
      d3.select(this).attr("stroke-opacity", 0.3);
      tooltip.style("opacity", 0);
    });

  // Nodes
  const nodeG = g.append("g")
    .selectAll("g")
    .data(sankeyNodes)
    .join("g")
    .on("mouseover", function(event, d) {
      tooltip.style("opacity", 1).html(`<strong>${d.name.replace(/\n/g, " ")}</strong><br>${d.value.toLocaleString()} households`);
    })
    .on("mousemove", function(event) {
      tooltip.style("left", (event.pageX + 10) + "px").style("top", (event.pageY + 10) + "px");
    })
    .on("mouseout", function() {
      tooltip.style("opacity", 0);
    });

  nodeG.append("rect")
    .attr("x", d => d.x0)
    .attr("y", d => d.y0)
    .attr("width",  d => d.x1 - d.x0)
    .attr("height", d => Math.max(1, d.y1 - d.y0))
    .attr("fill", d => nodeColor[d.id] || "#888")
    .attr("rx", 3);

  // Node labels
  nodeG.each(function(d) {
    const lines  = d.name.split("\n");
    const midY   = (d.y0 + d.y1) / 2;
    const isLeft = d.id === 0;
    const textX  = isLeft ? d.x0 - 6 : d.x1 + 6;
    const anchor = isLeft ? "end" : "start";
    const lineH  = 13;
    const startDy = -((lines.length - 1) * lineH) / 2;

    lines.forEach((line, i) => {
      d3.select(this).append("text")
        .attr("x", textX)
        .attr("y", midY + startDy + i * lineH)
        .attr("text-anchor", anchor)
        .attr("dominant-baseline", "middle")
        .attr("font-size", 11)
        .attr("font-family", "Arial, sans-serif")
        .attr("fill", "#222")
        .text(line);
    });
  });

  // Title
  const title = svg.append("text")
    .attr("x", width / 2)
    .attr("y", 0)
    .attr("text-anchor", "middle")
    .attr("font-size", 15)
    .attr("font-weight", "bold")
    .attr("font-family", "Arial, sans-serif");

  // Append SVG
  container.append(svg.node());
</script>

<script src="nav.js"></script>
