<!DOCTYPE html>
<div id="container"></div>
<script type="module">
  import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

  function prepareFSDData(data_2015_16, data_2017_18, data_2021_23) {
    const combined = [
      ...data_2015_16.map(d => ({ year: "2015-2016", FSD032A: d.FSD032A, FSD795: d.FSD795 })),
      ...data_2017_18.map(d => ({ year: "2017-2018", FSD032A: d.FSD032A, FSD795: d.FSD795 })),
      ...data_2021_23.map(d => ({ year: "2021-2023", FSD032A: d.FSD032A, FSD795: d.FSD795 })),
    ];
    const cleaned = combined.filter(d =>
      d.FSD032A !== "7.0" &&
      d.FSD032A !== "9.0" &&
      d.FSD032A !== ""   &&
      d.FSD795  !== "77" &&
      d.FSD795  !== "99" &&
      d.FSD795  !== ""
    );
    const aggregated = d3.rollups(
      cleaned,
      v => v.length,
      d => d.FSD032A,
      d => d.year
    ).flatMap(([fsd032a, yearMap]) =>
      yearMap.map(([year, count]) => ({
        FSD032A: fsd032a,
        year: year,
        value: count
      }))
    );
    return aggregated;
  }

  const years = ["2015-2016", "2017-2018", "2021-2023"];

  let data_2015_16 = []
  await d3.csv("food_security_2015_16.csv").then(data => {
    data_2015_16 = data;
  });

  let data_2017_18 = []
  await d3.csv("food_security_2017_18.csv").then(data => {
    data_2017_18 = data;
  });

  let data_2021_23 = []
  await d3.csv("food_security_2021_23.csv").then(data => {
    data_2021_23 = data;
  });

  const aggregated = prepareFSDData(data_2015_16, data_2017_18, data_2021_23);
  console.log(aggregated);

  const FSD032A_categories = {
    "1.0": "Often True",
    "2.0": "Sometimes True",
    "3.0": "Never True"
  }
  
  // Declare the chart dimensions and margins.
  const width = 600;
  const height = 600;
  const marginTop = 60;
  const marginRight = 100;
  const marginBottom = 60;
  const marginLeft = 80;
  // Declare the x (horizontal position) scale.
  const x0 = d3.scaleBand().domain(["1.0", "2.0", "3.0"]).range([marginLeft, width - marginRight]).padding(0.1);
  const xAxis = d3.axisBottom(x0).tickFormat(d => FSD032A_categories[d]);
  const x1 = d3.scaleBand().domain(years).range([0, x0.bandwidth()]).padding(0.05);
  // Declare the y (vertical position) scale.
  const y = d3.scaleLinear()
      .domain([0, d3.max(aggregated, d => d.value)]).nice()
      .range([height - marginBottom, marginTop]);
  // Create the SVG container.
  const svg = d3.create("svg")
      .attr("width", width)
      .attr("height", height);
  // Add the x-axis.
  svg.append("g")
      .attr("transform", `translate(0,${height - marginBottom})`)
      .call(xAxis);
  // Add the y-axis.
  svg.append("g")
      .attr("transform", `translate(${marginLeft},0)`)
      .call(d3.axisLeft(y));

  const color = d3.scaleOrdinal()
    .domain(years)
    .range(["#27A6F5", "#C4122D", "#5FEF0C"]);

  svg.selectAll("rect")
    .data(aggregated)
    .join("rect")
    .attr("x", d => x0(d.FSD032A) + x1(d.year))
    .attr("y", d => y(d.value))
    .attr("width", x1.bandwidth())
    .attr("height", d => height - marginBottom - y(d.value))
    .attr("fill", d => color(d.year));

  const title = svg.append("text")
    .attr("x", width / 2)
    .attr("y", marginTop / 2)
    .attr("text-anchor", "middle")
    .attr("font-size", 15)
    .attr("font-weight", "bold");

  title.append("tspan")
    .attr("x", width / 2)
    .attr("dy", 0)
    .text("Food Security Benefit Receipt by Household Food Worry Level");

  title.append("tspan")
    .attr("x", width / 2)
    .attr("dy", "1.2em")
    .text("(2015-16 vs. 2017-18 vs. 2021-23)");

  svg.append("text")
    .attr("x", width / 2)
    .attr("y", height - 10)
    .attr("text-anchor", "middle")
    .attr("font-size", 14)
    .text("Household Worried About Running Out of Food");

  svg.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -height / 2)
    .attr("y", 15)
    .attr("text-anchor", "middle")
    .attr("font-size", 14)
    .text("Total # of Months of Food Security Benefits Received in the Past 12 Months");

  const legend = svg.append("g")
    .attr("transform", `translate(${width - marginRight + 20}, ${marginTop + 30})`);
  years.forEach((year, i) => {
    const row = legend.append("g")
      .attr("transform", `translate(0, ${i * 22})`);
    row.append("rect")
      .attr("width", 14)
      .attr("height", 14)
      .attr("fill", color(year));
    row.append("text")
      .attr("x", 20)
      .attr("y", 12)
      .attr("font-size", 12)
      .text(year);
  });
  legend.append("text")
    .attr("y", -8)
    .attr("font-size", 13)
    .attr("font-weight", "bold")
    .text("Year");
  // Append the SVG element.
  container.append(svg.node());
</script>
